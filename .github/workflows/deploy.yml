name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual re-deploy from the Actions tab

# Allow GITHUB_TOKEN to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Cancel any in-flight deploys when a new one is queued
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .   # repo root contains index.html + assets/ + models/

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
